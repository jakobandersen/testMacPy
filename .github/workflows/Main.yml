name: Main tests

on: [push, pull_request]

jobs:
  macOS:
    strategy:
      matrix:
        version: [14]
      fail-fast: false
    runs-on: macos-${{ matrix.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: 'recursive'
    - name: Install Brew dependencies
      run: |
        brew --version
        brew update
        brew bundle --verbose
        /usr/libexec/path_helper | sed -e 's/^PATH="//' -e 's/"; export PATH;//' | tr ":" "\n"  | tail -r >> $GITHUB_PATH
    - name: Print data pre
      run: |
        brew info open-babel
        brew ls -v open-babel
        which python3
        which obabel
        python3 -m pip list -vvv
        echo "PATH: $PATH"
        echo "VIRTUAL_ENV: $VIRTUAL_ENV"
        which python3
        python3 -c "import sys; print('sys.path:', '\n  '.join(sys.path));"
        python3 -c "import openbabel; print(openbabel.__file__)"
    - name: Set up virtual environment
      run: |
        python3 -m venv --system-site-packages $GITHUB_WORKSPACE/myVenv
        echo "$GITHUB_WORKSPACE/myVenv/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/myVenv" >> $GITHUB_ENV
    - name: Print data
      run: |
        brew info open-babel
        which python3
        which obabel
        python3 -m pip list -vvv
        echo "PATH: $PATH"
        echo "VIRTUAL_ENV: $VIRTUAL_ENV"
    - name: Configure
      run: |
        which python3
        mkdir build
        cd build
        cmake ../ -DBUILD_TESTING=yes
    - name: Build
      run: cd build && make -j 4
    - name: Install
      run: cd build && sudo make install
    - name: Build tests
      run: cd build && make tests -j 4
    - name: Run tests
      run: cd build && ctest --verbose
